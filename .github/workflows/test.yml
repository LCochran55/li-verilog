name: test

on:
  # Every push onto the main branch triggers a retest.
  push:
    branches:
      - master
  # All pull_requests trigger a retest.
  pull_request:
  workflow_dispatch:

jobs:

  mac:
    strategy:
      fail-fast: false
      matrix:
        libvvp: [true]
        suffix: [true]
    runs-on: macos-15-intel
    name: 🍏 macOS${{ matrix.libvvp && ' +libvvp' || '' }}${{ matrix.suffix && ' +suffix' || '' }}
    steps:

    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        brew install bison
        brew install librdkafka
        brew install openjdk@17
        brew install wget

    - name: Build Kafka
      run: | 
        wget -q https://downloads.apache.org/kafka/4.3.0/kafka_2.13-4.3.0.tgz
        tar -xzf kafka_2.13-4.3.0.tgz
        cd kafka_2.13-4.3.0
        KAFKA_CLUSTER_ID=$(bin/kafka-storage.sh random-uuid)
        bin/kafka-storage.sh format --standalone -t $KAFKA_CLUSTER_ID -c config/server.properties
        bin/kafka-server-start.sh -daemon config/server.properties
        for i in {1..30}; do
          bin/kafka-topics.sh --list --bootstrap-server localhost:9092 &>/dev/null && break
          sleep 2
        done
        bin/kafka-topics.sh --create --topic vcd-topic --bootstrap-server localhost:9092 --partitions 1 --replication-factor 1 

    - name: Build, check and install
      run: |
        export PATH="/usr/local/opt/bison/bin:$PATH"
        CONFIG_OPTS="--enable-libveriuser"
        if [ "${{ matrix.libvvp }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-libvvp"
        fi
        if [ "${{ matrix.suffix }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-suffix"
        fi
        autoconf
        ./configure $CONFIG_OPTS
        make -j$(nproc) check
        sudo make install

  
    - name: Test
      run: |
        . .venv/bin/activate
        make check-installed
      env:
          KAFKA_BROKER: "localhost:9092"


  lin:
    strategy:
      fail-fast: false
      matrix:
        os: ['22.04', '24.04']
        # libvvp: [false, true]
        # suffix: [false, true]
    runs-on: ubuntu-${{ matrix.os }}
    name: 🐧 Ubuntu ${{ matrix.os }}${{ matrix.libvvp && ' +libvvp' || '' }}${{ matrix.suffix && ' +suffix' || '' }}
    steps:

    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt update -qq
        sudo apt install -y make g++ git bison flex gperf libreadline-dev libbz2-dev autoconf python3-venv librdkafka-dev openjdk-21-jdk-headless wget
        python3 -m venv .venv
        . .venv/bin/activate
        pip install --upgrade pip
        pip install -r Documentation/requirements.txt

    - name: Build Java 21 
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin' 

    - name: Build Kafka
      run: | 
        wget -q https://downloads.apache.org/kafka/4.3.0/kafka_2.13-4.3.0.tgz
        tar -xzf kafka_2.13-4.3.0.tgz
        cd kafka_2.13-4.3.0
        KAFKA_CLUSTER_ID=$(bin/kafka-storage.sh random-uuid)
        bin/kafka-storage.sh format --standalone -t $KAFKA_CLUSTER_ID -c config/server.properties
        bin/kafka-server-start.sh -daemon config/server.properties
        for i in {1..30}; do
          bin/kafka-topics.sh --list --bootstrap-server localhost:9092 &>/dev/null && break
          sleep 3
        done
        bin/kafka-topics.sh --create --topic vcd-topic --bootstrap-server localhost:9092 --partitions 1 --replication-factor 1

    - name: Build, check and install
      run: |
        CONFIG_OPTS="--enable-libveriuser"
        if [ "${{ matrix.libvvp }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-libvvp"
        fi
        if [ "${{ matrix.suffix }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-suffix"
        fi
        autoconf
        ./configure $CONFIG_OPTS
        make -j$(nproc) check
        sudo make install

    - name: Test
      run:
        . .venv/bin/activate
        make check-installed
      env:
          KAFKA_BROKER: "localhost:9092"

    - name: Documentation
      run: |
        . .venv/bin/activate
        cd Documentation
        make html

  win:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        msystem: [MINGW64, UCRT64, CLANG64]
        # libvvp: [false, true]
        # suffix: [false, true]
        include:
          - { msystem: MINGW64, env: x86_64 }
          - { msystem: UCRT64,  env: ucrt-x86_64 }
          - { msystem: CLANG64, env: clang-x86_64 }
    name: 🟪 ${{ matrix.msystem }}${{ matrix.libvvp && ' +libvvp' || '' }}${{ matrix.suffix && ' +suffix' || '' }}
    defaults:
      run:
        shell: msys2 {0}
    env:
      MINGW_ARCH: ${{ matrix.msystem }}
    steps:

    - run: git config --global core.autocrlf input
      shell: bash

    - uses: actions/checkout@v6

    - name: Build Java 21 
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.msystem }}
        update: true
        install: >
          git
          base-devel
          python-pip 
          mingw-w64-${{ matrix.env }}-librdkafka
          mingw-w64-${{ matrix.env }}-perl

    - uses: actions/setup-python@v6
      with:
        python-version: '>=3.5'

    - name: Build Kafka
      run: | 
        wget -q https://downloads.apache.org/kafka/4.3.0/kafka_2.13-4.3.0.tgz
        tar -xzf kafka_2.13-4.3.0.tgz
        cd kafka_2.13-4.3.0
        KAFKA_CLUSTER_ID=$(bin/kafka-storage.sh random-uuid)
        bin/kafka-storage.sh format --standalone -t $KAFKA_CLUSTER_ID -c config/server.properties
        bin/kafka-server-start.sh -daemon config/server.properties
        for i in {1..30}; do
          bin/kafka-topics.sh --list --bootstrap-server localhost:9092 &>/dev/null && break
          sleep 2
        done
        bin/kafka-topics.sh --create --topic vcd-topic --bootstrap-server localhost:9092 --partitions 1 --replication-factor 1

    - name: Build and check
      run: |
        cd msys2
        CONFIG_OPTS=""
        if [ ${{ matrix.msystem }} != "CLANG64" ] ; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-libveriuser"
        fi
        if [ "${{ matrix.libvvp }}" = "true" ] ; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-libvvp"
        fi
        if [ "${{ matrix.suffix }}" = "true" ]; then
            CONFIG_OPTS="$CONFIG_OPTS --enable-suffix"
        fi
        export IVL_CONFIG_OPTIONS="$CONFIG_OPTS"
        makepkg-mingw --noconfirm --noprogressbar -sCLf

    - name: Install
      run: pacman -U --noconfirm msys2/*.zst

    - name: Test
      run: |
        . .venv/bin/activate
        make check-installed

    - uses: actions/upload-artifact@v7
      with:
        name: 🟪 ${{ matrix.msystem }}${{ matrix.libvvp && ' +libvvp' || '' }}
        path: msys2/*.zst


